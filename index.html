<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --surface3: #2a2a2a;
    --border: #333;
    --border2: #444;
    --accent: #e8ff00;
    --accent2: #ff6b2b;
    --text: #f0f0f0;
    --text2: #999;
    --text3: #666;
    --done: #1a2e1a;
    --done-border: #2d5c2d;
    --done-text: #5cb85c;
    --red: #ff3b3b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-img {
    width: 36px;
    height: 36px;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #111;
  }
  .logo-img img { width: 100%; height: 100%; object-fit: contain; display: none; }
  .logo-placeholder {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .app-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    letter-spacing: 4px;
    color: var(--text);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .app-title span { color: var(--accent); }
  .app-title small {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 1px;
    color: var(--text3);
    text-transform: lowercase;
  }
  nav {
    display: flex;
    gap: 4px;
  }
  nav button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  nav button:hover { border-color: var(--accent); color: var(--accent); }
  nav button.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }

  /* MAIN */
  main { max-width: 900px; margin: 0 auto; padding: 24px 20px; }

  /* PAGE SECTIONS */
  .page { display: none; }
  .page.active { display: block; }

  /* DATE BAR */
  .date-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .date-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .date-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .session-info {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }

  /* QUEUE */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--text2);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* CATEGORY QUEUE */
  .queue-container {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 32px;
  }
  .cat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .cat-card.current {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .cat-card.done-today {
    border-color: var(--done-border);
    opacity: 0.75;
  }
  .cat-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 12px;
    cursor: pointer;
  }
  .cat-icon {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.5px;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface3);
    border: 1px solid var(--border2);
    border-radius: 3px;
    color: var(--text2);
    flex-shrink: 0;
  }
  .cat-card.current .cat-icon {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,0,0.07);
  }
  .cat-card.done-today .cat-icon {
    border-color: var(--done-border);
    color: var(--done-text);
    background: var(--done);
  }
  .cat-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 19px;
    letter-spacing: 2px;
    flex: 1;
  }
  .cat-card.current .cat-name { color: var(--accent); }
  .cat-card.done-today .cat-name { color: var(--done-text); }
  .cat-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .badge-next { border-color: var(--accent); color: var(--accent); background: rgba(232,255,0,0.07); }
  .badge-queue { border-color: var(--border); color: var(--text3); }
  .badge-done { border-color: var(--done-border); color: var(--done-text); background: var(--done); }
  .queue-pos {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    min-width: 20px;
    text-align: right;
  }
  .prev-record {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    padding: 4px 16px 8px 60px;
  }
  .prev-record span { color: var(--text2); }

  /* INPUT FORM */
  .cat-form {
    border-top: 1px solid var(--border);
    padding: 16px;
    background: var(--surface2);
    display: none;
  }
  .cat-card.current .cat-form { display: block; }
  .form-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-width: 100px;
  }
  .form-group label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
  }
  .form-group input {
    background: var(--surface3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 8px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .form-group input:focus { border-color: var(--accent); }
  .form-group input::placeholder { color: var(--text3); }
  .btn-confirm {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 8px 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 4px;
    transition: opacity 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-end;
  }
  .btn-confirm:hover { opacity: 0.85; }
  .target-hint {
    margin-top: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }
  .target-hint strong { color: var(--accent2); }

  /* TODAY LOG */
  .today-log {
    margin-top: 8px;
  }
  .log-entry {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 6px;
    background: var(--surface);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
  }
  .log-cat { color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .log-reps { color: var(--accent); font-weight: 500; font-size: 14px; }
  .log-weight { color: var(--text3); }
  .log-time { color: var(--text3); font-size: 10px; }
  .btn-del {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 3px;
    transition: color 0.15s;
  }
  .btn-del:hover { color: var(--red); }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    text-align: center;
  }
  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    color: var(--accent);
  }
  .stat-value.orange { color: var(--accent2); }

  /* ARCHIVE PAGE */
  .month-picker {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .month-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .month-btn:hover { border-color: var(--accent); color: var(--accent); }
  .month-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .archive-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
  }
  .archive-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
  }
  .archive-table td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text2);
  }
  .archive-table tr:hover td { background: var(--surface2); }
  .archive-table .reps-num { color: var(--accent); font-weight: 500; font-size: 14px; }
  .archive-table .date-col { color: var(--text3); font-size: 11px; }
  .month-totals {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .month-total-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
  }
  .mt-cat {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 1px;
    color: var(--text2);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .mt-reps {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: var(--accent);
  }
  .mt-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
  }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }

  /* PROGRESS comparison */
  .progress-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .pb-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text2);
    width: 90px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .pb-track {
    flex: 1;
    height: 6px;
    background: var(--surface3);
    border-radius: 3px;
    overflow: hidden;
  }
  .pb-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .pb-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    width: 50px;
    text-align: right;
    flex-shrink: 0;
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .month-totals { grid-template-columns: repeat(2, 1fr); }
    .app-title { font-size: 20px; }
    nav button { padding: 5px 9px; font-size: 10px; }
  }
  @media (max-width: 420px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .form-row { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="app-title">IRON<span>LOG</span> <small>by Ponzo</small></div>
  </div>
  <nav>
    <button class="active" onclick="showPage('training')">Allenamento</button>
    <button onclick="showPage('archive')">Archivio</button>
  </nav>
</header>

<main>

  <!-- TRAINING PAGE -->
  <div class="page active" id="page-training">

    <div class="date-bar">
      <div>
        <div class="date-label">Sessione odierna</div>
        <div class="date-value" id="todayDate">—</div>
      </div>
      <div class="session-info" id="sessionInfo">Nessuna serie completata</div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Rep oggi</div>
        <div class="stat-value" id="statTodayReps">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Categorie fatte</div>
        <div class="stat-value orange" id="statCatDone">0/8</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Serie questo mese</div>
        <div class="stat-value" id="statMonthSets">0</div>
      </div>
    </div>

    <div class="section-title">Coda allenamento</div>

    <div class="queue-container" id="queueContainer"></div>

    <div id="todayLogSection" style="display:none;">
      <div class="section-title">Log di oggi</div>
      <div class="today-log" id="todayLog"></div>
    </div>

  </div>

  <!-- ARCHIVE PAGE -->
  <div class="page" id="page-archive">
    <div class="section-title">Archivio mensile</div>

    <div class="month-picker" id="monthPicker"></div>

    <div id="archiveContent">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        Nessun dato registrato ancora.
      </div>
    </div>
  </div>

</main>

<script>
const CATEGORIES = [
  { id: 'petto',     name: 'Pettorali',   icon: 'PE' },
  { id: 'bicipiti',  name: 'Bicipiti',    icon: 'BI' },
  { id: 'tricipiti', name: 'Tricipiti',   icon: 'TR' },
  { id: 'dorsali',   name: 'Dorsali',     icon: 'DO' },
  { id: 'spalle',    name: 'Spalle',      icon: 'SP' },
  { id: 'gambe',     name: 'Gambe',       icon: 'GA' },
  { id: 'addominali',name: 'Addominali',  icon: 'AB' },
  { id: 'cardio',    name: 'Cardio',      icon: 'CA' },
];

function getState() {
  const raw = localStorage.getItem('ironlog_state');
  if (raw) return JSON.parse(raw);
  return {
    queue: CATEGORIES.map(c => c.id),
    logs: [],
    lastQueueReset: null
  };
}
function saveState(s) { localStorage.setItem('ironlog_state', JSON.stringify(s)); }

function todayStr() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}
function monthStr(d) {
  const dt = d ? new Date(d) : new Date();
  return dt.toISOString().slice(0, 7);
}
function fmtDate(iso) {
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function fmtMonthLabel(ym) {
  const [y,m] = ym.split('-');
  const months = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  return `${months[parseInt(m)-1]} ${y}`;
}

function getCatById(id) { return CATEGORIES.find(c => c.id === id); }

function getPrevRecord(state, catId) {
  const today = todayStr();
  const logs = state.logs.filter(l => l.cat === catId && l.date !== today);
  if (!logs.length) return null;
  logs.sort((a,b) => b.date.localeCompare(a.date));
  return logs[0];
}

function getTodayLogs(state) {
  return state.logs.filter(l => l.date === todayStr());
}

function getDoneToday(state) {
  const tl = getTodayLogs(state);
  return [...new Set(tl.map(l => l.cat))];
}

function getQueueState(state) {
  const done = getDoneToday(state);
  const queue = state.queue.filter(id => !done.includes(id));
  return { queue, done };
}

function resetQueueIfNewRound(state) {
  const done = getDoneToday(state);
  const allCats = CATEGORIES.map(c => c.id);
  const allDone = allCats.every(id => done.includes(id));
  if (allDone) {
    state.queue = [...allCats];
    state.lastQueueReset = todayStr();
    saveState(state);
  }
}

function renderTraining() {
  const state = getState();
  resetQueueIfNewRound(state);
  const today = todayStr();
  const { queue, done } = getQueueState(state);
  const todayLogs = getTodayLogs(state);

  // date bar
  document.getElementById('todayDate').textContent = fmtDate(today).replace(/\//g, ' / ');
  const sets = todayLogs.length;
  document.getElementById('sessionInfo').textContent = sets === 0
    ? 'Nessuna serie completata'
    : `${sets} serie completat${sets === 1 ? 'a' : 'e'} oggi`;

  // stats
  const totalRepsToday = todayLogs.reduce((s,l) => s + l.reps, 0);
  document.getElementById('statTodayReps').textContent = totalRepsToday;
  document.getElementById('statCatDone').textContent = `${done.length}/8`;
  const thisMonth = monthStr();
  const monthSets = state.logs.filter(l => l.date.startsWith(thisMonth)).length;
  document.getElementById('statMonthSets').textContent = monthSets;

  // queue
  const container = document.getElementById('queueContainer');
  container.innerHTML = '';

  // Build display order: current (queue[0]), rest of queue, done today
  const displayOrder = [
    ...queue.map((id, idx) => ({ id, status: idx === 0 ? 'current' : 'queue', pos: idx })),
    ...done.map(id => ({ id, status: 'done', pos: null })),
  ];

  displayOrder.forEach(({ id, status, pos }) => {
    const cat = getCatById(id);
    const prev = getPrevRecord(state, id);
    const isCurrent = status === 'current';
    const isDone = status === 'done';

    const card = document.createElement('div');
    card.className = `cat-card${isCurrent ? ' current' : ''}${isDone ? ' done-today' : ''}`;

    let badgeHtml = '';
    if (isCurrent) badgeHtml = `<span class="cat-badge badge-next">Prossimo</span>`;
    else if (isDone) badgeHtml = `<span class="cat-badge badge-done">✓ Fatto</span>`;
    else badgeHtml = `<span class="cat-badge badge-queue">#${pos + 1}</span>`;

    let prevHtml = '';
    if (prev) {
      prevHtml = `<div class="prev-record">Ultimo: <span>${prev.reps} rip${prev.weight ? ' @ ' + prev.weight + ' kg' : ''}</span> (${fmtDate(prev.date)})</div>`;
    } else {
      prevHtml = `<div class="prev-record">Nessun record precedente</div>`;
    }

    let targetHint = '';
    if (isCurrent && prev) {
      const target = prev.reps + 1;
      targetHint = `<div class="target-hint">Obiettivo minimo: <strong>${target} rip</strong> (migliora di almeno 1)</div>`;
    }

    let formHtml = '';
    if (isCurrent) {
      formHtml = `
        <div class="cat-form">
          <div class="form-row">
            <div class="form-group">
              <label>Ripetizioni</label>
              <input type="number" id="inp-reps-${id}" min="1" placeholder="es. 15" inputmode="numeric">
            </div>
            <div class="form-group">
              <label>Peso (kg) — opz.</label>
              <input type="number" id="inp-weight-${id}" min="0" step="0.5" placeholder="es. 20" inputmode="decimal">
            </div>
            <button class="btn-confirm" onclick="logSet('${id}')">Registra →</button>
          </div>
          ${targetHint}
        </div>`;
    }

    card.innerHTML = `
      <div class="cat-header" onclick="toggleCard('${id}')">
        <span class="cat-name">${cat.name}</span>
        ${badgeHtml}
      </div>
      ${prevHtml}
      ${formHtml}
    `;
    container.appendChild(card);
  });

  // Today's log
  const logSection = document.getElementById('todayLogSection');
  const logContainer = document.getElementById('todayLog');
  if (todayLogs.length > 0) {
    logSection.style.display = 'block';
    logContainer.innerHTML = '';
    [...todayLogs].reverse().forEach(entry => {
      const cat = getCatById(entry.cat);
      const el = document.createElement('div');
      el.className = 'log-entry';
      el.innerHTML = `
        <span class="log-cat">${cat.name}</span>
        <span class="log-reps">${entry.reps} rep</span>
        <span class="log-weight">${entry.weight ? entry.weight + ' kg' : '—'}</span>
        <span class="log-time">${entry.time}</span>
        <button class="btn-del" onclick="deleteLog('${entry.id}')" title="Elimina">✕</button>
      `;
      logContainer.appendChild(el);
    });
  } else {
    logSection.style.display = 'none';
  }
}

function logSet(catId) {
  const repsInput = document.getElementById(`inp-reps-${catId}`);
  const weightInput = document.getElementById(`inp-weight-${catId}`);
  const reps = parseInt(repsInput.value);
  if (!reps || reps < 1) { repsInput.focus(); repsInput.style.borderColor = 'var(--red)'; setTimeout(() => repsInput.style.borderColor = '', 800); return; }
  const weight = parseFloat(weightInput.value) || null;
  const state = getState();
  const now = new Date();
  const entry = {
    id: now.getTime().toString(),
    cat: catId,
    date: todayStr(),
    reps,
    weight,
    time: now.toTimeString().slice(0,5)
  };
  state.logs.push(entry);
  // Move catId to end of queue
  const idx = state.queue.indexOf(catId);
  if (idx !== -1) { state.queue.splice(idx, 1); state.queue.push(catId); }
  saveState(state);
  renderTraining();
}

function deleteLog(id) {
  const state = getState();
  const idx = state.logs.findIndex(l => l.id === id);
  if (idx === -1) return;
  const catId = state.logs[idx].cat;
  state.logs.splice(idx, 1);
  // If that cat no longer has a log today, move it back to front of queue
  const stillDoneToday = state.logs.some(l => l.cat === catId && l.date === todayStr());
  if (!stillDoneToday) {
    const qi = state.queue.indexOf(catId);
    if (qi !== -1) { state.queue.splice(qi, 1); state.queue.unshift(catId); }
  }
  saveState(state);
  renderTraining();
}

function toggleCard(catId) {
  // Only opens the current one; others just visual
}

// ---- ARCHIVE ----
function renderArchive() {
  const state = getState();
  const allMonths = [...new Set(state.logs.map(l => l.date.slice(0,7)))].sort((a,b) => b.localeCompare(a));
  const picker = document.getElementById('monthPicker');
  picker.innerHTML = '';
  if (!allMonths.length) {
    document.getElementById('archiveContent').innerHTML = `<div class="empty-state"><div class="empty-icon">—</div>Nessun dato registrato ancora.</div>`;
    return;
  }
  allMonths.forEach((ym, i) => {
    const btn = document.createElement('button');
    btn.className = 'month-btn' + (i === 0 ? ' active' : '');
    btn.textContent = fmtMonthLabel(ym);
    btn.onclick = () => {
      document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderMonthDetail(state, ym);
    };
    picker.appendChild(btn);
  });
  renderMonthDetail(state, allMonths[0]);
}

function renderMonthDetail(state, ym) {
  const logs = state.logs.filter(l => l.date.startsWith(ym));
  const content = document.getElementById('archiveContent');
  if (!logs.length) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">—</div>Nessuna sessione in ${fmtMonthLabel(ym)}</div>`;
    return;
  }

  // Totals per category
  const catTotals = {};
  CATEGORIES.forEach(c => catTotals[c.id] = { reps: 0, sets: 0 });
  logs.forEach(l => { catTotals[l.cat].reps += l.reps; catTotals[l.cat].sets++; });
  const maxReps = Math.max(...Object.values(catTotals).map(v => v.reps), 1);
  const totalReps = Object.values(catTotals).reduce((s,v) => s + v.reps, 0);
  const totalSets = logs.length;

  let html = `
    <div class="stats-row" style="margin-bottom:20px;">
      <div class="stat-card"><div class="stat-label">Rep totali</div><div class="stat-value">${totalReps}</div></div>
      <div class="stat-card"><div class="stat-label">Serie totali</div><div class="stat-value orange">${totalSets}</div></div>
      <div class="stat-card"><div class="stat-label">Giorni attivi</div><div class="stat-value">${[...new Set(logs.map(l=>l.date))].length}</div></div>
    </div>
    <div class="section-title">Ripetizioni per categoria</div>
    <div style="margin-bottom:28px;">
  `;
  CATEGORIES.forEach(c => {
    const v = catTotals[c.id];
    if (v.reps === 0) return;
    const pct = Math.round((v.reps / maxReps) * 100);
    html += `
      <div class="progress-bar-row">
        <div class="pb-label">${c.name.slice(0,8)}</div>
        <div class="pb-track"><div class="pb-fill" style="width:${pct}%"></div></div>
        <div class="pb-value">${v.reps}</div>
      </div>
    `;
  });
  html += `</div><div class="section-title">Log dettagliato</div>`;

  // Table
  const sorted = [...logs].sort((a,b) => b.date.localeCompare(a.date) || b.time.localeCompare(a.time));
  html += `<table class="archive-table">
    <thead><tr><th>Data</th><th>Categoria</th><th>Rip</th><th>Peso</th><th>Ora</th></tr></thead>
    <tbody>`;
  sorted.forEach(l => {
    const cat = getCatById(l.cat);
    html += `<tr>
      <td class="date-col">${fmtDate(l.date)}</td>
      <td>${cat.name}</td>
      <td class="reps-num">${l.reps}</td>
      <td style="color:var(--text3)">${l.weight ? l.weight + ' kg' : '—'}</td>
      <td style="color:var(--text3);font-size:11px">${l.time}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  content.innerHTML = html;
}

// ---- NAVIGATION ----
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('nav button').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && id === 'training') || (i === 1 && id === 'archive'));
  });
  if (id === 'archive') renderArchive();
  if (id === 'training') renderTraining();
}

// ---- INIT ----
renderTraining();
</script>
</body>
</html>
